<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESUME | Yekta Demirci</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="page-resume">

    <!-- Navigation -->
    <nav id="navbar" class="dark-bg">
        <ul>
            <li><a href="/">HOME</a></li>
            <li><a href="portfolio">PORTFOLIO</a></li>
            <li><a href="resume" class="active">RESUME</a></li>
            <li><a href="featured">FEATURED</a></li>
            <li><a href="/#contact">CONTACT</a></li>
        </ul>
    </nav>

    <main class="resume-container">
        <!-- Dot Navigation Sidebar -->
        <nav class="dot-nav">
            <ul id="resume-dots">
                <li><a href="#top" title="Top"><span class="dot"></span></a></li>
                <!-- Dynamic dots will be injected here -->
            </ul>
        </nav>

        <h1 class="page-title text-center fade-in-section" id="resume-title">RESUME</h1>

        <div class="pdf-download text-center fade-in-section">
            <p class="italic">PDF Download</p>
            <a href="#" class="btn-download uppercase" id="resume-download-btn">RESUME 2026</a>
        </div>

        <div class="resume-section">
            <h2 class="resume-header italic text-center fade-in-section">Work Experience</h2>

            <div id="dynamic-resume-list">
                <!-- Dynamic content from projects-data.js will be injected here -->
            </div>
        </div>
    </main>

    <!-- Common Footer style -->
    <footer>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/yekta-demirci" target="_blank" aria-label="LinkedIn"><i
                    class="fa-brands fa-linkedin-in"></i></a>
            <a href="https://yekta-demirci.itch.io/" target="_blank" aria-label="Itch.io"><i
                    class="fa-brands fa-itch-io"></i></a>
            <a href="https://github.com/Lutherieon" target="_blank" aria-label="GitHub"><i
                    class="fa-brands fa-github"></i></a>
            <a href="https://www.artstation.com/devletsanatcisi" target="_blank" aria-label="ArtStation"><i
                    class="fa-brands fa-artstation"></i></a>
        </div>
        <p>© 2026 by Yekta Demirci</p>
    </footer>

    <!-- Scripts -->
    <script src="projects-data.js"></script>
    <script src="script.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof window.RESUME_DATA !== 'undefined') {
                // 1. Update Header and Download
                document.getElementById('resume-title').textContent = window.RESUME_DATA.title;
                const downloadBtn = document.getElementById('resume-download-btn');
                downloadBtn.href = window.RESUME_DATA.downloadLink;
                downloadBtn.textContent = window.RESUME_DATA.downloadLabel;

                // 2. Inject Experience and Dots
                const container = document.getElementById('dynamic-resume-list');
                const dotsList = document.getElementById('resume-dots');

                window.RESUME_DATA.experience.forEach(item => {
                    // Create Item Element
                    const itemEl = document.createElement('div');
                    itemEl.className = 'resume-item fade-in-section';
                    itemEl.id = item.id;

                    let itemHTML = `
                        <div class="resume-content">
                            <h3 class="role">${item.role}</h3>
                            <h4 class="company">${item.company}</h4>
                            <p class="dates">(${item.dates})</p>
                            <p class="description italic">${item.description}</p>
                        </div>
                    `;

                    if (item.logo) {
                        itemHTML += `<div class="resume-logo" style="background-image: url('${item.logo}');"></div>`;
                    }

                    itemEl.innerHTML = itemHTML;
                    container.appendChild(itemEl);

                    // Add Dot for this job
                    const dotLi = document.createElement('li');
                    dotLi.innerHTML = `<a href="#${item.id}" title="${item.role}"><span class="dot"></span></a>`;
                    dotsList.appendChild(dotLi);
                });

                // Re-initialize animations and nav
                if (window.initFadeAnimations) window.initFadeAnimations();
                if (window.initDotNav) window.initDotNav();

                // Force a refresh of visibility
                window.dispatchEvent(new Event('resize'));
            }
        });
    </script>
</body>

</html>

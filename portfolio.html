<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO | Yekta Demirci</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Projects Data -->
    <script src="projects-data.js"></script>
</head>

<body class="page-portfolio">

    <!-- Navigation -->
    <nav id="navbar" class="dark-bg">
        <ul>
            <li><a href="/">HOME</a></li>
            <li><a href="portfolio" class="active">PORTFOLIO</a></li>
            <li><a href="resume">RESUME</a></li>
            <li><a href="featured">FEATURED</a></li>
            <li><a href="/#contact">CONTACT</a></li>
        </ul>
    </nav>

    <main class="portfolio-container">
        <h1 class="page-title text-center">PORTFOLIO</h1>

        <div id="portfolio-filters" class="portfolio-filters">
            <!-- Filter buttons will be dynamically injected here -->
        </div>

        <div class="portfolio-grid" id="portfolio-grid">
            <!-- Projects will be dynamically injected here -->
        </div>

        <div id="pagination" class="pagination">
            <!-- Page numbers will be injected here -->
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const grid = document.getElementById('portfolio-grid');
                const pagination = document.getElementById('pagination');
                const filtersContainer = document.getElementById('portfolio-filters');
                const itemsPerPage = 9;
                let currentPage = 1;
                let currentCategory = 'All';
                let filteredProjects = [];

                if (grid && typeof PROJECTS !== 'undefined') {

                    // Filter initialization
                    const categories = window.PORTFOLIO_CATEGORIES || ['All'];

                    function renderFilters() {
                        if (filtersContainer && categories.length > 1) {
                            filtersContainer.innerHTML = '';
                            categories.forEach(category => {
                                const btn = document.createElement('button');
                                btn.className = `filter-btn ${category === currentCategory ? 'active' : ''}`;
                                btn.innerText = category;
                                btn.addEventListener('click', () => {
                                    currentCategory = category;
                                    currentPage = 1; // Reset to first page
                                    renderFilters(); // Update active state
                                    updateFilteredProjects();
                                });
                                filtersContainer.appendChild(btn);
                            });
                        }
                    }

                    function updateFilteredProjects() {
                        if (currentCategory === 'All') {
                            filteredProjects = PROJECTS;
                        } else {
                            // Using includes on toUpperCase for flexible matching
                            filteredProjects = PROJECTS.filter(p =>
                                p.category && p.category.toUpperCase().includes(currentCategory.toUpperCase())
                            );
                        }
                        renderProjects(currentPage);
                        renderPagination();
                    }

                    function renderProjects(page) {
                        grid.innerHTML = '';
                        const start = (page - 1) * itemsPerPage;
                        const end = start + itemsPerPage;
                        const paginatedItems = filteredProjects.slice(start, end);

                        paginatedItems.forEach(project => {
                            const card = document.createElement('a');
                            card.href = `project-detail?id=${project.id}`;
                            card.className = 'project-card';

                            card.innerHTML = `
                                <div class="card-image" style="background-image: url('${project.thumbnail}');"></div>
                                <div class="card-overlay">
                                    <h3 class="uppercase">${project.title}</h3>
                                    <p class="italic">${project.thumbnailSubtitle || project.category}</p>
                                </div>
                            `;
                            grid.appendChild(card);
                        });

                        // Scroll to top of grid when page changes (only if it wasn't the first load)
                        if (page !== 1 || (pagination.innerHTML !== '' && pagination.children.length > 1)) {
                            const targetTop = filtersContainer ? filtersContainer.offsetTop - 120 : grid.offsetTop - 100;
                            window.scrollTo({ top: targetTop, behavior: 'smooth' });
                        }
                    }

                    function renderPagination() {
                        pagination.innerHTML = '';
                        const totalPages = Math.ceil(filteredProjects.length / itemsPerPage);

                        if (totalPages <= 1) return;

                        for (let i = 1; i <= totalPages; i++) {
                            const btn = document.createElement('button');
                            btn.innerText = i;
                            btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                            btn.addEventListener('click', () => {
                                currentPage = i;
                                renderProjects(currentPage);
                                renderPagination();
                            });
                            pagination.appendChild(btn);
                        }
                    }

                    renderFilters();
                    updateFilteredProjects();
                }
            });
        </script>
    </main>

    <!-- Common Footer style -->
    <footer>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/yekta-demirci" target="_blank" aria-label="LinkedIn"><i
                    class="fa-brands fa-linkedin-in"></i></a>
            <a href="https://yekta-demirci.itch.io/" target="_blank" aria-label="Itch.io"><i
                    class="fa-brands fa-itch-io"></i></a>
            <a href="https://github.com/Lutherieon" target="_blank" aria-label="GitHub"><i
                    class="fa-brands fa-github"></i></a>
            <a href="https://www.artstation.com/devletsanatcisi" target="_blank" aria-label="ArtStation"><i
                    class="fa-brands fa-artstation"></i></a>
        </div>
        <p>© 2026 by Yekta Demirci</p>
    </footer>
</body>

</html>

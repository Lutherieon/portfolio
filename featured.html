<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEATURED | Yekta Demirci</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="page-featured">

    <!-- Navigation -->
    <nav id="navbar" class="dark-bg">
        <ul>
            <li><a href="/">HOME</a></li>
            <li><a href="portfolio">PORTFOLIO</a></li>
            <li><a href="resume">RESUME</a></li>
            <li><a href="featured" class="active">FEATURED</a></li>
            <li><a href="/#contact">CONTACT</a></li>
        </ul>
    </nav>

    <main class="featured-container">
        <!-- Dot Navigation Sidebar -->
        <nav class="dot-nav">
            <ul id="featured-dots">
                <li><a href="#top" title="Top"><span class="dot"></span></a></li>
                <!-- Dynamic dots will be injected here -->
            </ul>
        </nav>

        <h1 class="page-title text-center fade-in-section" id="featured-title">FEATURED</h1>
        <p class="featured-subtitle italic text-center fade-in-section" id="featured-subtitle">
            Speaking Engagements | Publications | Open Source Contributions
        </p>

        <div class="featured-list" id="dynamic-featured-list">
            <!-- Dynamic content from projects-data.js will be injected here -->
        </div>
    </main>

    <!-- Common Footer style -->
    <footer>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/yekta-demirci" target="_blank" aria-label="LinkedIn"><i
                    class="fa-brands fa-linkedin-in"></i></a>
            <a href="https://yekta-demirci.itch.io/" target="_blank" aria-label="Itch.io"><i
                    class="fa-brands fa-itch-io"></i></a>
            <a href="https://github.com/Lutherieon" target="_blank" aria-label="GitHub"><i
                    class="fa-brands fa-github"></i></a>
            <a href="https://www.artstation.com/devletsanatcisi" target="_blank" aria-label="ArtStation"><i
                    class="fa-brands fa-artstation"></i></a>
        </div>
        <p>© 2026 by Yekta Demirci</p>
    </footer>

    <!-- Scripts -->
    <script src="projects-data.js"></script>
    <script src="script.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof window.FEATURED_DATA !== 'undefined') {
                // 1. Update Header
                document.getElementById('featured-title').textContent = window.FEATURED_DATA.title;
                document.getElementById('featured-subtitle').textContent = window.FEATURED_DATA.subtitle;

                // 2. Inject Groups and Dots
                const container = document.getElementById('dynamic-featured-list');
                const dotsList = document.getElementById('featured-dots');

                window.FEATURED_DATA.groups.forEach(group => {
                    // Create Year Group Element
                    const groupEl = document.createElement('div');
                    groupEl.className = 'featured-year-group fade-in-section';
                    groupEl.id = group.id;

                    let entriesHTML = `<h2 class="year-title">${group.year}</h2>`;

                    group.entries.forEach(entry => {
                        entriesHTML += `
                            <div class="featured-entry">
                                <p class="entry-title">
                                    <a href="${entry.link}" target="_blank">${entry.title}</a>
                                </p>
                                <p class="entry-location italic">${entry.location}</p>
                                <p class="entry-desc italic">${entry.description}</p>
                            </div>
                        `;
                    });

                    // Add Floating Image
                    entriesHTML += `<div class="featured-image img-right ${group.floatClass}" style="background-image: url('${group.image}');"></div>`;

                    groupEl.innerHTML = entriesHTML;
                    container.appendChild(groupEl);

                    // Add Dot for this Year
                    const dotLi = document.createElement('li');
                    dotLi.innerHTML = `<a href="#${group.id}" title="${group.year} Engagement"><span class="dot"></span></a>`;
                    dotsList.appendChild(dotLi);
                });

                // Re-initialize animations and nav
                if (window.initFadeAnimations) window.initFadeAnimations();
                if (window.initDotNav) window.initDotNav();

                // Force a refresh of visibility
                window.dispatchEvent(new Event('resize'));
            }
        });
    </script>
</body>

</html>

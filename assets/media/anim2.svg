<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#071024" rx="8" />
  <g transform="translate(60,40)">
    <g fill="#f97316" opacity="0.95">
      <circle cx="60" cy="60" r="24">
        <animate attributeName="r" values="18;30;18" dur="2.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="180" cy="120" r="14" fill="#34D399">
        <animate attributeName="cx" values="180;300;180" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
    <text x="0" y="20" fill="#e6edf3" font-family="Segoe UI, Roboto, Arial" font-size="22">VFX — Particle Iteration</text>
    <g transform="translate(0,40)" opacity="0.85">
      <rect x="0" y="0" width="680" height="320" rx="8" fill="#fff" opacity="0.03"/>
    </g>
  </g>
</svg>
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT | Yekta Demirci</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Projects Data -->
    <script src="projects-data.js"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body class="page-project-detail">

    <!-- Navigation -->
    <nav id="navbar" class="dark-bg">
        <ul>
            <li><a href="/">HOME</a></li>
            <li><a href="portfolio" class="active">PORTFOLIO</a></li>
            <li><a href="resume">RESUME</a></li>
            <li><a href="featured">FEATURED</a></li>
            <li><a href="/#contact">CONTACT</a></li>
        </ul>
    </nav>

    <!-- Dynamic Project Hero -->
    <header class="project-hero" id="project-hero">
        <div class="hero-image-placeholder" id="hero-banner">
            <!-- Dynamic banner (image or PDF) will be injected here -->
        </div>
    </header>

    <main class="project-container">
        <!-- Return Link -->
        <div class="return-nav fade-in-section">
            <a href="portfolio" class="return-link">
                <span class="arrow">&lt;</span> RETURN
            </a>
        </div>

        <!-- Project Header and Metadata -->
        <div class="project-header text-center fade-in-section">
            <h1 class="project-title" id="page-project-title">Project Title</h1>
            <p class="project-metadata italic" id="page-project-metadata">
                Metadata
            </p>
        </div>

        <!-- Dynamic Content Column -->
        <article class="project-content" id="project-content-area">
            <p class="intro-text fade-in-section" id="page-project-intro">
                Intro text...
            </p>

            <div id="dynamic-sections">
                <!-- Project sections will be injected here -->
            </div>
        </article>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');

            if (projectId && typeof PROJECTS !== 'undefined') {
                const project = PROJECTS.find(p => p.id === projectId);

                if (project) {
                    // 1. Update Title and Metadata
                    document.title = `${project.title.toUpperCase()} | Yekta Demirci`;
                    document.getElementById('page-project-title').textContent = project.title;
                    document.getElementById('page-project-metadata').textContent = project.metadata;
                    document.getElementById('page-project-intro').textContent = project.intro;

                    // 2. Handle Banner (Image vs PDF)
                    const bannerContainer = document.getElementById('hero-banner');
                    if (project.bannerType === 'pdf') {
                        bannerContainer.className = 'pdf-container';
                        bannerContainer.id = 'pdf-viewer-container';
                        bannerContainer.innerHTML = `
                            <canvas id="pdf-canvas"></canvas>
                            <button id="prev-page" class="pdf-nav-btn prev"><i class="fas fa-chevron-left"></i></button>
                            <button id="next-page" class="pdf-nav-btn next"><i class="fas fa-chevron-right"></i></button>
                            <div id="page-num-display" class="page-indicator">
                                <span id="page-num">1</span> / <span id="page-count">0</span>
                            </div>
                        `;
                        // Trigger PDF load (logic exists in script.js, we just need to pass the URL)
                        window.PDF_SRC = project.bannerSrc;
                    } else {
                        bannerContainer.style.backgroundImage = `url('${project.bannerSrc}')`;
                    }

                    // 3. Inject Sections
                    const sectionsContainer = document.getElementById('dynamic-sections');
                    project.sections.forEach(section => {
                        const sectionEl = document.createElement('section');
                        sectionEl.className = 'content-block fade-in-section';
                        sectionEl.id = section.id;
                        sectionEl.innerHTML = `
                            <h2>${section.title}</h2>
                            <p>${section.content}</p>
                        `;
                        sectionsContainer.appendChild(sectionEl);
                    });

                    // 4. Re-initialize Fade Animations for new content
                    if (window.initFadeAnimations) {
                        window.initFadeAnimations();
                    }
                }
            }
        });
    </script>
    </main>

    <!-- Common Footer style -->
    <footer>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/yekta-demirci" target="_blank" aria-label="LinkedIn"><i
                    class="fa-brands fa-linkedin-in"></i></a>
            <a href="https://yekta-demirci.itch.io/" target="_blank" aria-label="Itch.io"><i
                    class="fa-brands fa-itch-io"></i></a>
            <a href="https://github.com/Lutherieon" target="_blank" aria-label="GitHub"><i
                    class="fa-brands fa-github"></i></a>
            <a href="https://www.artstation.com/devletsanatcisi" target="_blank" aria-label="ArtStation"><i
                    class="fa-brands fa-artstation"></i></a>
        </div>
        <p>© 2026 by Yekta Demirci</p>
    </footer>


    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT | Yekta Demirci</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Projects Data -->
    <script src="projects-data.js"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body class="page-project-detail">

    <!-- Navigation -->
    <nav id="navbar" class="dark-bg">
        <ul>
            <li><a href="/">HOME</a></li>
            <li><a href="portfolio" class="active">PORTFOLIO</a></li>
            <li><a href="resume">RESUME</a></li>
            <li><a href="featured">FEATURED</a></li>
            <li><a href="/#contact">CONTACT</a></li>
        </ul>
    </nav>

    <!-- Dynamic Project Hero -->
    <header class="project-hero" id="project-hero">
        <div class="hero-image-placeholder" id="hero-banner">
            <!-- Dynamic banner (image or PDF) will be injected here -->
        </div>
    </header>

    <main class="project-container">
        <!-- Return Link -->
        <div class="return-nav fade-in-section">
            <a href="portfolio" class="return-link">
                <span class="arrow">&lt;</span> RETURN
            </a>
        </div>

        <!-- Project Header and Metadata -->
        <div class="project-header text-center fade-in-section" id="page-project-title-container">
            <h1 class="project-title" id="page-project-title">Project Title</h1>
            <p class="project-metadata italic" id="page-project-metadata">
                Metadata
            </p>
        </div>

        <!-- Dynamic Content Column -->
        <article class="project-content" id="project-content-area">
            <p class="intro-text fade-in-section" id="page-project-intro">
                Intro text...
            </p>

            <div id="dynamic-sections">
                <!-- Project sections will be injected here -->
            </div>
        </article>

        <!-- Next Project Navigation Placeholder -->
        <div id="next-project-anchor"></div>

        <!-- Dot Navigation Sidebar (Vertical) -->
        <nav class="dot-nav" id="sidebar-dots">
            <ul id="dots-list">
                <!-- Dynamic dots will be injected here -->
            </ul>
        </nav>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');

            if (projectId && typeof PROJECTS !== 'undefined') {
                const projectIndex = PROJECTS.findIndex(p => p.id === projectId);
                const project = PROJECTS[projectIndex];

                if (project) {
                    // 1. Update Title and Metadata
                    document.title = `${project.title.toUpperCase()} | Yekta Demirci`;
                    document.getElementById('page-project-title').textContent = project.title;
                    document.getElementById('page-project-metadata').textContent = project.metadata;
                    document.getElementById('page-project-intro').innerHTML = project.intro;
                    // const contentArea = document.getElementById('project-content-area'); // This line was removed in the provided diff, but it's not explicitly part of the instruction. Keeping it for now.

                    // 2. Handle Banner (Top Background)
                    const bannerContainer = document.getElementById('hero-banner');
                    if (project.bannerType === 'pdf') {
                        // Use PDF container setup
                        bannerContainer.innerHTML = `
                            <div id="pdf-canvas-container" class="pdf-wrapper" data-pdf-url="${project.bannerSrc}"></div>
                            <button id="prev-page" class="pdf-nav-btn prev"><i class="fas fa-chevron-left"></i></button>
                            <button id="next-page" class="pdf-nav-btn next"><i class="fas fa-chevron-right"></i></button>
                            <div id="page-num-display" class="page-indicator">
                                <span id="page-num">1</span> / <span id="page-count">0</span>
                            </div>
                        `;
                        window.PDF_SRC = project.bannerSrc;
                    } else if (project.bannerType === 'video') {
                        bannerContainer.innerHTML = `
                            <div style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: var(--bg-color-dark);">
                                <iframe src="${project.bannerSrc}" 
                                    style="aspect-ratio: 16 / 9; height: 100%; max-width: 100%; border: none;" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                                    allowfullscreen>
                                </iframe>
                            </div>
                        `;
                        bannerContainer.style.backgroundColor = 'var(--bg-color-dark)';
                    } else if (project.bannerSrc) {
                        bannerContainer.style.backgroundImage = `url('${project.bannerSrc}')`;
                    } else {
                        bannerContainer.style.backgroundColor = 'var(--bg-color-dark)';
                    }

                    // 3. Helper to render media blocks (Images, Videos, PDFs, Groups)
                    function renderMediaBlock(media) {
                        if (!media) return '';

                        if (media.type === 'image') {
                            return `<div class="media-block fade-in-section"><img src="${media.src}" alt="${media.caption || ''}">${media.caption ? `<p class="media-caption">${media.caption}</p>` : ''}</div>`;
                        } else if (media.type === 'video') {
                            const videoHTML = media.provider === 'youtube' ?
                                `<iframe src="${media.src}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>` :
                                `<video controls src="${media.src}"></video>`;
                            return `<div class="media-block video-wrapper fade-in-section">${videoHTML}</div>`;
                        } else if (media.type === 'pdf') {
                            return `<div class="media-block pdf-block fade-in-section"><embed src="${media.src}" type="application/pdf"></div>`;
                        } else if (media.type === 'media-group') {
                            // If the group only has 1 item, render it as a standalone block so it spans full width
                            if (media.items && media.items.length === 1) {
                                return renderMediaBlock(media.items[0]);
                            }
                            let groupHTML = `<div class="media-grid fade-in-section">`;
                            media.items.forEach(item => groupHTML += renderMediaBlock(item));
                            groupHTML += `</div>`;
                            return groupHTML;
                        }
                        return '';
                    }

                    // 4. Inject Main Media (under intro)
                    if (project.mainMedia) {
                        const mainMediaEl = document.createElement('div');
                        mainMediaEl.innerHTML = renderMediaBlock(project.mainMedia);
                        document.getElementById('page-project-intro').after(mainMediaEl);
                    }

                    // 5. Inject Sections and Dots
                    const sectionsContainer = document.getElementById('dynamic-sections');
                    const dotsList = document.getElementById('dots-list');

                    // Add Hero and Intro Dots
                    dotsList.innerHTML += `<li><a href="#top" title="Top"><span class="dot"></span></a></li>`;
                    dotsList.innerHTML += `<li><a href="#page-project-title-container" title="Introduction"><span class="dot"></span></a></li>`;

                    project.sections.forEach(section => {
                        // Section Injection
                        const sectionEl = document.createElement('section');
                        sectionEl.className = 'content-block fade-in-section';
                        sectionEl.id = section.id;

                        let sectionHTML = `<h2>${section.title}</h2>`;

                        // Support for new 'blocks' array
                        if (section.blocks) {
                            section.blocks.forEach(block => {
                                if (block.type === 'text') {
                                    sectionHTML += `<p class="text-block">${block.value}</p>`;
                                } else {
                                    sectionHTML += renderMediaBlock(block);
                                }
                            });
                        }
                        // Backward compatibility for old 'content' field
                        else if (section.content) {
                            sectionHTML += `<p>${section.content}</p>`;
                        }

                        sectionEl.innerHTML = sectionHTML;
                        sectionsContainer.appendChild(sectionEl);

                        // Dot Injection
                        const dotLi = document.createElement('li');
                        dotLi.innerHTML = `<a href="#${section.id}" title="${section.title}"><span class="dot"></span></a>`;
                        dotsList.appendChild(dotLi);
                    });

                    // 6. Next Project Navigation
                    if (PROJECTS.length > 1) {
                        const nextIndex = (projectIndex + 1) % PROJECTS.length;
                        const nextProject = PROJECTS[nextIndex];
                        const nextNav = document.getElementById('next-project-anchor');

                        nextNav.innerHTML = `
                            <div class="next-project-nav fade-in-section" id="next-project-section">
                                <span class="next-label">NEXT PROJECT</span>
                                <a href="project-detail.html?id=${nextProject.id}" class="next-project-link">
                                    <div class="next-project-card">
                                        <div class="next-img" style="background-image: url('${nextProject.thumbnail}');"></div>
                                        <div class="next-project-overlay">
                                            <h2 class="next-project-title uppercase">
                                                ${nextProject.title} <span class="next-arrow">→</span>
                                            </h2>
                                        </div>
                                    </div>
                                </a>
                            </div>
                        `;

                        // Add Next Project Dot
                        dotsList.innerHTML += `<li><a href="#next-project-section" title="Next Project"><span class="dot"></span></a></li>`;
                    }

                    // 6. Final Initialization for dynamic elements
                    if (window.initFadeAnimations) window.initFadeAnimations();
                    if (window.initDotNav) window.initDotNav();
                }
            }
        });
    </script>

    <!-- Common Footer style -->
    <footer>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/yekta-demirci" target="_blank" aria-label="LinkedIn"><i
                    class="fa-brands fa-linkedin-in"></i></a>
            <a href="https://yekta-demirci.itch.io/" target="_blank" aria-label="Itch.io"><i
                    class="fa-brands fa-itch-io"></i></a>
            <a href="https://github.com/Lutherieon" target="_blank" aria-label="GitHub"><i
                    class="fa-brands fa-github"></i></a>
            <a href="https://www.artstation.com/devletsanatcisi" target="_blank" aria-label="ArtStation"><i
                    class="fa-brands fa-artstation"></i></a>
        </div>
        <p>© 2026 by Yekta Demirci</p>
    </footer>


    <script src="script.js"></script>
</body>

</html>
